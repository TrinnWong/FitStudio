<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Book a Class</ion-title>
    <ion-buttons slot="end">
      <ion-button>
        <ion-icon name="notifications-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="ion-padding">
    <div class="user-welcome">
      <h2>Hello, <b>Daniel</b></h2>
      <p>You have <span style="color: var(--ion-color-primary); font-weight: 700;">12 Credits</span> left</p>
    </div>

    <div class="horizontal-scroll" style="display: flex; overflow-x: auto; gap: 12px; margin: 20px 0; padding-bottom: 10px;">
      <div class="glass-card ion-padding filter-chip active">All</div>
      <div class="glass-card ion-padding filter-chip">Jump</div>
      <div class="glass-card ion-padding filter-chip">Pilates</div>
      <div class="glass-card ion-padding filter-chip">Yoga</div>
    </div>

    <h3>Available Classes</h3>
    
    <div class="class-card glass-card ion-padding" style="margin-bottom: 16px; position: relative; overflow: hidden;">
      <div class="class-info">
        <ion-badge color="primary">JUMP</ion-badge>
        <h2 style="margin: 10px 0; font-weight: 700;">Morning Cardio Blast</h2>
        <p><ion-icon name="time-outline"></ion-icon> 08:00 AM - 09:00 AM</p>
        <p><ion-icon name="people-outline"></ion-icon> 4 slots remaining</p>
      </div>
      <ion-button expand="block" mode="ios" class="ion-margin-top" style="--border-radius: 12px;">Book Now</ion-button>
    </div>

    <div class="class-card glass-card ion-padding" style="margin-bottom: 16px;">
      <div class="class-info">
        <ion-badge color="secondary">PILATES</ion-badge>
        <h2 style="margin: 10px 0; font-weight: 700;">Core Strength & Flow</h2>
        <p><ion-icon name="time-outline"></ion-icon> 10:30 AM - 11:30 AM</p>
        <p><ion-icon name="people-outline"></ion-icon> 12 slots remaining</p>
      </div>
      <ion-button expand="block" mode="ios" class="ion-margin-top" style="--border-radius: 12px;">Book Now</ion-button>
    </div>

  </div>
</ion-content>

<style>
.filter-chip {
  min-width: 80px;
  text-align: center;
  border-radius: 20px;
  font-weight: 600;
}
.filter-chip.active {
  background: var(--ion-color-primary);
  border: none;
}
</style>
