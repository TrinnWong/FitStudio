<ion-split-pane contentId="main-content" when="lg">
  <!-- Side Menu -->
  <ion-menu contentId="main-content" type="overlay" class="admin-menu">
    <ion-content>
      <div class="menu-header">
        <img src="assets/logo.png" alt="FitStudio" class="logo">
        <span class="logo-text">FitStudio</span>
      </div>

      <ion-list lines="none">
        <ion-menu-toggle auto-hide="false">
          <ion-item routerLink="/tabs/tab1" routerDirection="root" detail="false" class="menu-item">
            <ion-icon slot="start" name="home-outline"></ion-icon>
            <ion-label>Inicio</ion-label>
          </ion-item>
          
          <ion-item detail="false" class="menu-item">
            <ion-icon slot="start" name="cart-outline"></ion-icon>
            <ion-label>Punto de venta</ion-label>
          </ion-item>

          <ion-item detail="false" class="menu-item">
            <ion-icon slot="start" name="calendar-outline"></ion-icon>
            <ion-label>Calendario</ion-label>
          </ion-item>

          <!-- Productos Dropdown / Submenu -->
          <div class="submenu-container">
            <ion-item detail="false" class="menu-item parent-item" (click)="toggleProducts()">
              <ion-icon slot="start" name="cube-outline"></ion-icon>
              <ion-label>Productos</ion-label>
              <ion-icon slot="end" [name]="productsOpen ? 'chevron-down' : 'chevron-forward'"></ion-icon>
            </ion-item>
            
            <div class="submenu" *ngIf="productsOpen">
              <ion-item routerLink="/tabs/gym-classes" routerDirection="forward" class="submenu-item">
                <ion-icon slot="start" name="people-outline"></ion-icon>
                <ion-label>Clases</ion-label>
              </ion-item>
              <ion-item class="submenu-item">
                <ion-icon slot="start" name="time-outline"></ion-icon>
                <ion-label>Citas 1-1</ion-label>
              </ion-item>
              <ion-item class="submenu-item">
                <ion-icon slot="start" name="school-outline"></ion-icon>
                <ion-label>Cursos</ion-label>
              </ion-item>
              <ion-item class="submenu-item">
                <ion-icon slot="start" name="videocam-outline"></ion-icon>
                <ion-label>Videos</ion-label>
              </ion-item>
            </div>
          </div>

          <ion-item detail="false" class="menu-item">
            <ion-icon slot="start" name="card-outline"></ion-icon>
            <ion-label>Membresías</ion-label>
          </ion-item>

          <ion-item detail="false" class="menu-item">
            <ion-icon slot="start" name="people-circle-outline"></ion-icon>
            <ion-label>Contactos</ion-label>
          </ion-item>

          <ion-item detail="false" class="menu-item">
            <ion-icon slot="start" name="megaphone-outline"></ion-icon>
            <ion-label>Marketing</ion-label>
          </ion-item>

          <ion-item detail="false" class="menu-item">
            <ion-icon slot="start" name="bar-chart-outline"></ion-icon>
            <ion-label>Analítica</ion-label>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>

      <div class="menu-footer">
        <p class="section-title">CANALES DE VENTAS</p>
        <ion-item detail="false" class="menu-item small">
          <ion-icon slot="start" name="globe-outline"></ion-icon>
          <ion-label>Website y App</ion-label>
          <ion-icon slot="end" name="eye-outline"></ion-icon>
        </ion-item>
        <ion-item detail="false" class="menu-item small">
          <ion-icon slot="start" name="link-outline"></ion-icon>
          <ion-label>Link en bio</ion-label>
        </ion-item>
      </div>
    </ion-content>
  </ion-menu>

  <!-- Main Content -->
  <div class="ion-page" id="main-content">
    <ion-header class="ion-no-border">
      <ion-toolbar>
        <ion-buttons slot="start">
          <ion-menu-toggle>
            <ion-button fill="clear">
              <ion-icon slot="icon-only" name="menu-outline"></ion-icon>
            </ion-button>
          </ion-menu-toggle>
        </ion-buttons>
        <ion-buttons slot="end">
           <ion-button class="btn-top secondary">
             <ion-icon slot="start" name="call-outline"></ion-icon>
             Solicitar demo
           </ion-button>
           <ion-button class="btn-top primary">Seleccionar plan</ion-button>
           <ion-button class="btn-top secondary">
             <ion-icon slot="start" name="share-outline"></ion-icon>
             Compartir
           </ion-button>
           <ion-button class="btn-top secondary">
             <ion-icon slot="start" name="flash-outline"></ion-icon>
             Acciones
           </ion-button>
           <div class="user-avatar" id="user-trigger">DA</div>
           
           <ion-popover trigger="user-trigger" triggerAction="click" class="user-popover">
             <ng-template>
               <ion-content>
                 <ion-list lines="none">
                   <ion-item button (click)="logout()">
                     <ion-icon slot="start" name="log-out-outline" color="danger"></ion-icon>
                     <ion-label color="danger">Cerrar sesión</ion-label>
                   </ion-item>
                 </ion-list>
               </ion-content>
             </ng-template>
           </ion-popover>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>

    <ion-content>
      <ion-router-outlet></ion-router-outlet>
    </ion-content>
  </div>
</ion-split-pane>
